<!DOCTYPE html>

        <div class="card"></div>
        <div class="card"></div>
      </div>

        <div class="card">
          <div class="card_img a1" draggable="true"></div>
        </div>

        <div class="card">
          <div class="card_img a2" draggable="true"></div>
        </div>

        <div class="card">
          <div class="card_img a3" draggable="true"></div>
        </div>

        <button class="add-card" id="add-card-bottom">+</button>
      </div>
    </div>
    <script src="script.js"></script>
