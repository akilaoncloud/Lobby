<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="biblioteca.js"></script>
    <style>
        body {
            margin: 0px -40px;

            display: flex;
            flex-direction: row;
        }

        form {
            margin-left: 60px;
        }
    </style>
    <title>Exercício 11</title>
</head>
<body>
    <form>
        <h2>Departamento</h2>
        <input type="text" placeholder="Código do Departamento"><br><br>
        <input type="text" placeholder="Nome do Departamento"><br><br>
        <input type="button" value="Cadastrar" onclick="theEllipse(0)">
    </form>
    <form>
        <h2>Funcionário</h2>
        <input type="text" placeholder="Código do Funcionário"><br><br>
        <input type="text" placeholder="Código do Departamento"><br><br>
        <input type="text" placeholder="Nome do Funcionário"><br><br>
        <input type="date" placeholder="Data de Nascimento"><br><br>
        <input type="number" placeholder="Salário"><br><br>
        <input type="button" value="Cadastrar" onclick="theEllipse(1)">
    </form>
    <form>
        <h2>Dependente</h2>
        <input type="text" placeholder="Código do Dependente">
        <br><br>
        <input type="text" placeholder="Nome do Dependente">
        <br><br>
        <select id="oi">
            <option value="">Código do Supervisor</option>
            <option value="1">01</option>
            <option value="2">02</option>
            <option value="3">03</option>
        </select>
        <br><br>
        <input type="checkbox" id="chk1" name="Checkbox 1"><label for="chk1">Checkbox 1</label><br>
        <input type="checkbox" id="chk2" name="Checkbox 2"><label for="chk2">Checkbox 2</label>
        <br><br>
        <input type="radio" name="Campo de Radios" id="rd-a"><label for="rd-a">Radio A</label><br>
        <input type="radio" name="Campo de Radios" id="rd-b"><label for="rd-b">Radio B</label><br>
        <input type="radio" name="Campo de Radios" id="rd-c"><label for="rd-c">Radio C</label><br>
        <input type="radio" name="Campo de Radios" id="rd-d"><label for="rd-d">Radio D</label><br>
        <input type="radio" name="Campo de Radios" id="rd-e"><label for="rd-e">Radio E</label>
        <br><br>
        <input type="text" placeholder="Teste 1">
        <br><br>
        <input type="text" placeholder="Teste 2">
        <br><br>
        <input type="button" value="Cadastrar" onclick="theEllipse(2)">
    </form>
</body>
</html>
